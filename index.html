<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para una Mujer Especial</title>

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.card{
background:rgba(255,255,255,0.2);
padding:40px;
border-radius:20px;
backdrop-filter: blur(10px);
animation: aparecer 2s;
}

img{
width:200px;
height:200px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
}

h1{
font-size:40px;
}

p{
font-size:20px;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
}
}

</style>

</head>

<body>

<div class="card">

<img src="foto.jpeg">

<h1>🌹 Feliz Día de la Mujer 🌹</h1>

<p>
Eres una mujer increíble.
</p>

<p>
Tu sonrisa ilumina todo y haces que cada día sea mejor.
</p>

<p>
Gracias por ser tan especial.
</p>

<p>
❤️ Con mucho cariño ❤️
</p>

</div>

</body>
</html>
